name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Tests & compile (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: JVM unit tests
        run: ./gradlew ciTestJvm --no-daemon --stacktrace

      - name: JVM line coverage (Kover, min 90%)
        run: ./gradlew ciCoverage --no-daemon --stacktrace

      - name: Compile (Android + JVM desktop, sin iOS)
        run: ./gradlew ciCompile --no-daemon --stacktrace

  ios:
    name: Compile & test iOS targets (macOS)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile iOS targets
        run: >
          ./gradlew
          :retry-journal:compileKotlinIosArm64
          :retry-journal:compileKotlinIosSimulatorArm64
          :retry-worker:compileKotlinIosArm64
          :retry-worker:compileKotlinIosSimulatorArm64
          :retry-sample:shared:compileKotlinIosArm64
          :retry-sample:shared:compileKotlinIosSimulatorArm64
          :retry-sample:composeApp:compileKotlinIosArm64
          :retry-sample:composeApp:compileKotlinIosSimulatorArm64
          --no-daemon --stacktrace

      - name: iOS Simulator unit tests
        run: >
          ./gradlew
          :retry-journal:iosSimulatorArm64Test
          :retry-worker:iosSimulatorArm64Test
          --no-daemon --stacktrace

      - name: Native (iOS) binary compatibility
        run: >
          ./gradlew
          :retry-journal:klibApiCheck
          :retry-worker:klibApiCheck
          --no-daemon --stacktrace
