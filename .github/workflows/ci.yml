name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Tests & compile (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: JVM unit tests
        run: ./gradlew ciTestJvm --no-daemon --stacktrace

      - name: JVM line coverage (Kover, min 90%)
        run: ./gradlew ciCoverage --no-daemon --stacktrace

      - name: Compile (Android + JVM desktop, sin iOS)
        run: ./gradlew ciCompile --no-daemon --stacktrace

  # iOS verification requires macOS — see docs/development.md for build commands.
